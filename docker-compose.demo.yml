services:
  proxy:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
      - "2112:2112"
    volumes:
      - ./config.demo.yaml:/app/config.yaml:ro
      - ./certs:/app/certs:ro
    depends_on:
      - demo-upstream1
      - demo-upstream2

  demo-upstream1:
    image: nginx:stable-alpine
    ports:
      - "9000:80"
    volumes:
      - ./demo/upstream1:/usr/share/nginx/html:ro

  demo-upstream2:
    image: nginx:stable-alpine
    ports:
      - "9001:80"
    volumes:
      - ./demo/upstream2:/usr/share/nginx/html:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - proxy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/proxy.json:/var/lib/grafana/dashboards/proxy.json:ro
    depends_on:
      - prometheus
